// ==================== AI FEEDBACK ====================

function getRuleBasedFeedback(section, content, topic, claim, side) {
  const text = (content || "").trim();
  const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
  if (!text || wordCount < 3) return "✏️ נראה שעדיין לא כתבתם מספיק. נסו לכתוב לפחות משפט שלם אחד!";
  const feedbacks = [];
  const endsWithPeriod = /[.!?]$/.test(text.trim());
  const isFragment = wordCount < 6 && !endsWithPeriod;
  const isPartialSentence = wordCount >= 3 && wordCount < 8 && !endsWithPeriod;

  if (section === "opening") {
    if (isFragment) { return "⚠️ מה שכתבתם הוא לא משפט שלם! פתיחה צריכה להיות לפחות 2-3 משפטים.\n💡 דוגמה: 'בימינו, נושא הטלפונים הניידים מעסיק רבים. יש הטוענים שהם מפריעים ללמידה, ויש הטוענים שהם כלי חיוני.'"; }
    const hasOpinion = /לדעתי|אני סבור|אני חושב|עמדתי|אני טוען|אני מאמין/.test(text);
    const hasQuestion = /\?/.test(text);
    const hasDilemma = /האם|השאלה|יש הטוענים.*ויש|מצד אחד.*מצד שני|חלוקות הדעות|שנוי במחלוקת/.test(text);
    if (hasOpinion) feedbacks.push("⚠️ נראה שהפתיחה שלכם חושפת את דעתכם! בפתיחה אנחנו עדיין לא חושפים עמדה.");
    else feedbacks.push("👏 הפתיחה לא חושפת דעה – בדיוק כמו שצריך!");
    if (hasQuestion) feedbacks.push("✨ שימוש יפה בשאלה!");
    if (!hasDilemma && wordCount >= 10 && !hasOpinion) feedbacks.push("💡 חסרה דילמה! נסו להוסיף: 'יש הטוענים... ויש הטוענים...' או 'האם...?'");
    else if (hasDilemma) feedbacks.push("🌟 יש דילמה בפתיחה – מצוין!");
    if (wordCount >= 18) feedbacks.push("👍 אורך טוב לפתיחה!");
    else feedbacks.push("📝 אורך סביר, אפשר להרחיב עוד.");
  } else if (section === "claim") {
    const hasOpinionWord = /לדעתי|אני סבור|עמדתי|אני חושב|אני טוען/.test(text);
    const hasClearStance = /יש ל|אין ל|צריך|ראוי ל|חייבים|מומלץ/.test(text);
    const isHesitant = /אולי|יכול להיות|לא בטוח|גם וגם/.test(text);
    if (isFragment) return "⚠️ זה לא משפט שלם. טענה חייבת להיות משפט שלם.\n💡 דוגמה: 'לדעתי, יש לאסור שימוש בטלפונים ניידים בבתי ספר.'";
    if (isHesitant) feedbacks.push("🤔 הטענה מהססת. טענה טובה היא נחרצת!");
    else if (hasOpinionWord && hasClearStance) feedbacks.push("🌟 טענה מצוינת! ברורה, נחרצת, ומביעה עמדה. כל הכבוד!");
    else if (hasClearStance) feedbacks.push("👍 יש עמדה ברורה. אפשר לחזק עם 'לדעתי'.");
    else feedbacks.push("⚠️ לא ברור מה העמדה שלכם. נסחו: 'לדעתי, יש ל...' או 'לדעתי, אין ל...'");
    if (wordCount > 30) feedbacks.push("📏 הטענה ארוכה מדי. טענה טובה היא קצרה – משפט אחד.");
  } else if (section === "arguments") {
    const hasConnectors = /ראשית|שנית|נוסף על כך|יתרה מזו|כמו כן/.test(text);
    const hasExampleWords = /לדוגמה|למשל|מחקר|סקר/.test(text);
    const hasReasonWords = /מפני|משום|כיוון|בשל|הסיבה/.test(text);
    if (wordCount < 12) feedbacks.push("✏️ הנימוקים קצרים מדי. נסו לפתח כל נימוק עם הסבר ודוגמה.");
    else feedbacks.push("👏 כתבתם נימוקים בהיקף טוב!");
    if (hasConnectors) feedbacks.push("✨ שימוש יפה במילות קישור!");
    else feedbacks.push("💡 הוסיפו 'ראשית', 'שנית', 'נוסף על כך' לסדר את הנימוקים.");
    if (hasExampleWords) feedbacks.push("📚 יפה! הוספתם דוגמאות.");
    else feedbacks.push("📝 הוסיפו 'לדוגמה...' לחזק כל נימוק.");
    if (hasReasonWords) feedbacks.push("👍 שימוש טוב במילות סיבה!");
  } else if (section === "summary") {
    const hasSummaryWord = /לסיכום|לאור|מכל|סוף דבר|לסיום/.test(text);
    const hasRecommendation = /ממליץ|מומלץ|כדאי|ראוי|יש ל|חשוב ש/.test(text);
    if (hasSummaryWord) feedbacks.push("✅ פתחתם עם מילת סיכום – מצוין!");
    else feedbacks.push("⚠️ חסרה מילת סיכום! פתחו ב'לסיכום' או 'לאור כל האמור'.");
    if (wordCount < 15) feedbacks.push("✏️ הסיכום קצר. צריך: חזרה על הטענה + מסקנה + המלצה.");
    if (hasRecommendation) feedbacks.push("⭐ מעולה! הוספתם המלצה.");
    else feedbacks.push("📝 הוסיפו המלצה: 'מומלץ ש...' או 'על כן, חשוב ש...'");
  } else if (section === "refutation") {
    const hasRefutationStructure = /אמנם.*אולם|אמנם.*אך|למרות.*יש|נכון ש.*אך/.test(text);
    const mentionsOtherSide = /יש הטוענים|טוענים ש|יש האומרים|הצד השני/.test(text);
    if (hasRefutationStructure) feedbacks.push("🌟 מבנה הפרכה מצוין! 'אמנם... אולם...' – בדיוק כמו שצריך!");
    else if (mentionsOtherSide) feedbacks.push("👍 טוב שהתייחסתם לצד השני! נסו להשתמש ב'אמנם... אולם...'");
    else feedbacks.push("⚠️ ההפרכה צריכה להתייחס לצד השני. נסו: 'אמנם יש הטוענים ש... אולם...'");
  } else if (section === "full") {
    feedbacks.push("🎉 כתבתם טקסט טיעוני מלא – הישג מרשים!");
    if (/לדעתי|אני סבור|עמדתי/.test(text)) feedbacks.push("✅ הטענה מופיעה בטקסט.");
    if (/אמנם.*אולם|למרות|אף על פי/.test(text)) feedbacks.push("✅ יש הפרכה – מעולה!");
    if (/לסיכום|לאור|מכל הסיבות/.test(text)) feedbacks.push("✅ יש פסקת סיכום.");
    if (/ראשית|שנית|נוסף|לדוגמה/.test(text)) feedbacks.push("✅ שימוש במילות קישור.");
  }
  return feedbacks.join("\n");
}

async function getAIFeedback(section, content, topic, claim, side) {
  const text = (content || "").trim();
  const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
  if (!text || wordCount < 3) return "✏️ נראה שעדיין לא כתבתם מספיק. נסו לכתוב לפחות משפט שלם אחד!";
  const endsWithPeriod = /[.!?]$/.test(text.trim());
  const isFragment = wordCount < 6 && !endsWithPeriod;
  if (section !== "draft" && (isFragment || (wordCount < 8 && !endsWithPeriod))) {
    return getRuleBasedFeedback(section, content, topic, claim, side);
  }

  const sectionMap = {
    opening: `בדוק את פסקת הפתיחה. היא צריכה: להציג את הנושא באופן כללי, להציג דילמה/שאלה, ולא לחשוף דעה אישית.`,
    claim: `בדוק את הטענה. היא צריכה להיות ברורה, חד-משמעית, ולהביע עמדה.`,
    arguments: `בדוק את הנימוקים. בדוק: קישוריות לנושא, בהירות, דוגמאות, מילות קישור.`,
    summary: `בדוק את הסיכום: חזרה על הטענה, מסקנה, המלצה.`,
    refutation: `בדוק את ההפרכה. היא צריכה: להתייחס לצד השני, להשתמש ב'אמנם... אולם...'`,
    full: `בדוק את הטקסט המלא: פתיחה, טענה, נימוקים, הפרכה, סיכום, מילות קישור.`,
    draft: `בדוק את הרעיונות בטיוטה. בדוק: כפילויות, הכללות מול דוגמאות ספציפיות, בהירות.`,
  };

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `אתה מורה לכתיבה טיעונית בחטיבת ביניים. תן משוב חינוכי, מעודד ובונה. השתמש באימוג'י. שפה פשוטה. עד 5 משפטים. הנושא: "${topic || ""}"`,
        messages: [{ role: "user", content: `${sectionMap[section] || ""}\n\nתוכן התלמיד/ה:\n"${content}"` }],
      }),
    });
    if (!response.ok) return getRuleBasedFeedback(section, content, topic, claim, side);
    const result = await response.json();
    if (result.error) return getRuleBasedFeedback(section, content, topic, claim, side);
    const aiText = result.content?.filter(c => c.type === "text")?.map(c => c.text)?.join("\n") || "";
    return aiText.trim() || getRuleBasedFeedback(section, content, topic, claim, side);
  } catch (e) {
    return getRuleBasedFeedback(section, content, topic, claim, side);
  }
}

  const shuffled = useRef([...OPENING_QUIZ].sort(() => Math.random() - 0.5).slice(0, 4));

function QuizConnectors({ onComplete }) {

  const score = Object.entries(answers).filter(([i, v]) => v === shuffled.current[i].category).length;

  return (
    <div style={{ background: "#fff8f0", borderRadius: 16, padding: "20px 24px", marginBottom: 20, border: "1px solid #f0d8b0" }}>

      {shuffled.current.map((item, i) => (
        <div key={i} style={{ background: "#fff", borderRadius: 12, padding: "12px 16px", marginBottom: 10, border: showResults ? `2px solid ${answers[i] === item.category ? "#66bb6a" : "#ef5350"}` : "1px solid #f0e0c8" }}>

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

              <button key={cat} onClick={() => !showResults && setAnswers({ ...answers, [i]: cat })} style={{ padding: "7px 16px", borderRadius: 10, fontSize: 15, cursor: showResults ? "default" : "pointer", fontFamily: "'Heebo', sans-serif", fontWeight: 600, background: answers[i] === cat ? "#e8dff5" : "#f8f8f8", border: answers[i] === cat ? "2px solid #7c5cbf" : "1px solid #ddd", color: "#5a3e8e" }}>{catNames[cat]}</button>
            ))}
          </div>
          {showResults && <p style={{ margin: "6px 0 0", fontSize: 14, color: answers[i] === item.category ? "#2e7d32" : "#c62828" }}>{answers[i] === item.category ? "✅ נכון!" : `❌ התשובה: ${catNames[item.category]}`}</p>}
        </div>
      ))}
      {!showResults ? (
        <Button onClick={() => setShowResults(true)} disabled={Object.keys(answers).length < shuffled.current.length} variant="secondary" style={{ marginTop: 8, fontSize: 15 }}>בדיקה ←</Button>
      ) : (
        <div>
          <p style={{ fontSize: 14, color: "#e65100", fontWeight: 700, margin: "10px 0" }}>ציון: {score}/{shuffled.current.length} 🌟</p>
          <Button onClick={() => onComplete(score)} variant="secondary" style={{ fontSize: 15 }}>סיום ←</Button>
        </div>
      )}
    </div>
  );
}

function Stage4_Arguments({ data, setData, onNext, onBack }) {
  const [quizDone, setQuizDone] = useState(false);
  const [connectorQuizDone, setConnectorQuizDone] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [fbLoading, setFbLoading] = useState(false);

  const relevantArgs = data.side === "pro" ? data.prosArguments : data.consArguments;
  const args = data.detailedArguments || [
    { argument: relevantArgs?.[0] || "", example: "" },
    { argument: relevantArgs?.[1] || "", example: "" },
  ];

  const updateArg = (i, field, v) => { const u = [...args]; u[i] = { ...u[i], [field]: v }; setData({ ...data, detailedArguments: u }); };

  const getFb = async () => {

// ==================== CONFETTI ====================

function Confetti({ active }) {
  const [particles, setParticles] = useState([]);
  useEffect(() => {
    if (!active) { setParticles([]); return; }
    const colors = ["#ff6b6b", "#ffd93d", "#6bcb77", "#4d96ff", "#ff6eb4", "#a66cff"];
    const p = Array.from({ length: 60 }, (_, i) => ({ id: i, x: Math.random() * 100, delay: Math.random() * 0.5, color: colors[Math.floor(Math.random() * colors.length)], size: 6 + Math.random() * 8, duration: 2 + Math.random() * 2 }));
    setParticles(p);
    const t = setTimeout(() => setParticles([]), 4000);
    return () => clearTimeout(t);
  }, [active]);
  if (particles.length === 0) return null;
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, pointerEvents: "none", zIndex: 9999, overflow: "hidden" }}>
      {particles.map(p => (
        <div key={p.id} style={{ position: "absolute", left: `${p.x}%`, top: "-10px", width: p.size, height: p.size, background: p.color, borderRadius: "50%", animation: `confettiFall ${p.duration}s ease-in ${p.delay}s forwards` }} />
      ))}
      <style>{`@keyframes confettiFall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }`}</style>
    </div>
  );
}

  const [completedStages, setCompletedStages] = useState(new Set());
  const [showConfetti, setShowConfetti] = useState(false);
  const [theme, setTheme] = useState("purple");
  const [showThemeMenu, setShowThemeMenu] = useState(false);
  const T = THEMES[theme];
  const dailyTip = useRef(DAILY_TIPS[Math.floor(Math.random() * DAILY_TIPS.length)]);

  const awardPoints = (stageNum) => {
    if (!completedStages.has(stageNum)) {
      setPoints(p => p + 10);
      setCompletedStages(s => new Set([...s, stageNum]));
    }
  };
  const triggerConfetti = () => { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 100); };

  const P1 = ["בחירת נושא", "טיוטה", "פתיחה", "טענה", "נימוקים", "סיכום", "צפייה"];
  const P2 = ["לימוד הפרכה", "תרגול", "כתיבה מלאה", "סיום"];
  const next = () => { awardPoints(stage); if (stage === 5 || stage === 10) triggerConfetti(); setStage(s => Math.min(s + 1, 10)); };
  const back = () => setStage(s => Math.max(s - 1, 0));
  const goTo = (s) => { setStage(s); setShowJumpMenu(false); };
  const isPart2 = stage >= 7;

  const stages = [
    <Stage0_TopicSelect data={data} setData={setData} onNext={next} />,
    <Stage1_Draft data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage2_Opening data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage3_Claim data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage4_Arguments data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage5_Summary data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage6_Review data={data} onNext={next} onBack={back} />,
    <Stage7_LearnRefutation data={data} onNext={next} onBack={back} />,
    <Stage8_PracticeRefutation data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage9_FullEssay data={data} setData={setData} onNext={next} onBack={back} />,
    <Stage10_FinalReview data={data} onBack={back} onPractice={() => { setPracticeMode(true); }} />,
  ];

  if (practiceMode) {
    return (
      <div style={{ minHeight: "100vh", direction: "rtl", background: T.bg, fontFamily: "'Heebo', sans-serif", padding: "24px" }}>
        <StageCard title="תרגול חופשי" icon="🔄" color="#00897b">
          <InfoBox type="success">בחרו נושא חדש וכתבו טקסט טיעוני מלא בעצמכם!</InfoBox>
          <Button onClick={() => setPracticeMode(false)} variant="outline">→ חזרה ללומדה</Button>
        </StageCard>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", direction: "rtl", background: T.bg, fontFamily: "'Heebo', sans-serif" }}>
      <Confetti active={showConfetti} />
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; }
      `}</style>
      <div style={{ maxWidth: 960, margin: "0 auto", padding: "24px 24px 60px" }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <h1 style={{ fontSize: 36, fontWeight: 900, margin: "0 0 6px", background: T.gradient, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>✏️ לומדת כתיבה טיעונית</h1>
          <p style={{ fontSize: 18, color: T.primary + "99", margin: 0 }}>שיטת פטנד"ס – פתיחה · טענה · נימוקים · דוגמאות · סיכום</p>
          <p style={{ fontSize: 15, color: T.primary, margin: "8px 0 0", fontWeight: 700 }}>יצרה וערכה: מורן קמיל גלברג – הוראה מותאמת</p>
        </div>

        {/* Points + Theme bar */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "8px 16px", background: "#fff", borderRadius: 14, boxShadow: `0 2px 12px ${T.cardShadow}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 22 }}>⭐</span>
            <span style={{ fontSize: 18, fontWeight: 800, color: T.primary }}>{points}</span>
            <span style={{ fontSize: 14, color: T.primary + "88" }}>נקודות</span>
          </div>
          <div style={{ position: "relative" }}>
            <button onClick={() => setShowThemeMenu(!showThemeMenu)} style={{ background: T.gradient, border: "none", borderRadius: 10, padding: "6px 14px", fontSize: 14, cursor: "pointer", fontFamily: "'Heebo', sans-serif", color: "#fff", fontWeight: 600 }}>🎨 ערכת צבעים</button>
            {showThemeMenu && (
              <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 4, background: "#fff", borderRadius: 12, boxShadow: "0 8px 24px rgba(0,0,0,0.15)", padding: 8, zIndex: 100, display: "flex", gap: 6 }}>
                {Object.entries(THEMES).map(([key, t]) => (
                  <button key={key} onClick={() => { setTheme(key); setShowThemeMenu(false); }} style={{ padding: "8px 14px", borderRadius: 10, border: theme === key ? `2px solid ${t.primary}` : "1px solid #eee", background: theme === key ? t.bg : "#fff", cursor: "pointer", fontFamily: "'Heebo', sans-serif", fontSize: 14, fontWeight: 600, color: t.primary }}>{t.emoji} {t.name}</button>
                ))}
              </div>
            )}
          </div>
        </div>

        {stage === 0 && <div style={{ background: `linear-gradient(135deg, ${T.primary}10, ${T.accent}10)`, border: `1px solid ${T.primary}25`, borderRadius: 14, padding: "12px 18px", marginBottom: 16, fontSize: 16, color: T.primary, lineHeight: 1.7 }}>{dailyTip.current}</div>}

        {stage > 0 && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: T.primary }}>{isPart2 ? "חלק ב' – הפרכה" : "חלק א' – כתיבה טיעונית"}</span>
              <span style={{ fontSize: 16, fontWeight: 800, color: T.primary }}>{Math.round(((stage) / 10) * 100)}%</span>
            </div>
            <div style={{ height: 10, background: T.primary + "20", borderRadius: 10, overflow: "hidden" }}>
              <div style={{ height: "100%", borderRadius: 10, background: T.gradient, transition: "width 0.6s", width: `${((stage) / 10) * 100}%` }} />
            </div>
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 12 }}>
          <button onClick={() => setShowJumpMenu(!showJumpMenu)} style={{ background: "#fff", border: "1px solid #d0c4e8", borderRadius: 10, padding: "6px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Heebo', sans-serif", color: "#6a4fa0", fontWeight: 600 }}>📍 קפיצה לשלב</button>
          {showJumpMenu && (
            <div style={{ position: "absolute", background: "#fff", borderRadius: 14, padding: "12px 16px", boxShadow: "0 8px 32px rgba(90,62,142,0.15)", border: "1px solid #e0d6f0", zIndex: 100, minWidth: 260 }}>
              <p style={{ fontSize: 13, color: "#5a3e8e", margin: "0 0 10px", fontWeight: 700 }}>📍 בחרו שלב:</p>
              {P1.map((name, i) => (
                <button key={i} onClick={() => goTo(i)} style={{ display: "block", width: "100%", padding: "8px 14px", borderRadius: 8, textAlign: "right", fontSize: 14, fontFamily: "'Heebo', sans-serif", cursor: "pointer", border: "none", background: stage === i ? "linear-gradient(135deg, #6a4fa0, #9a75d6)" : "#f5f0ff", color: stage === i ? "#fff" : "#5a3e8e", marginBottom: 4 }}>{i + 1}. {name}</button>
              ))}
              {P2.map((name, i) => (
                <button key={i + 7} onClick={() => goTo(i + 7)} style={{ display: "block", width: "100%", padding: "8px 14px", borderRadius: 8, textAlign: "right", fontSize: 14, fontFamily: "'Heebo', sans-serif", cursor: "pointer", border: "none", background: stage === i + 7 ? "linear-gradient(135deg, #c62828, #ef5350)" : "#fef0f0", color: stage === i + 7 ? "#fff" : "#c62828", marginBottom: 4 }}>{i + 1}. {name}</button>
              ))}
              <button onClick={() => setShowJumpMenu(false)} style={{ width: "100%", marginTop: 8, padding: "6px", borderRadius: 8, border: "1px solid #e0d6f0", background: "#faf8ff", fontSize: 14, cursor: "pointer", fontFamily: "'Heebo', sans-serif", color: "#8a7aaa" }}>סגור ✕</button>
            </div>
          )}
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 16 }}>
          {[["חלק א' – כתיבה טיעונית", !isPart2, "#6a4fa0", "#9070c0"], ["חלק ב' – הפרכה", isPart2, "#c62828", "#ef5350"]].map(([text, active, c1, c2], i) => (
            <div key={i} onClick={() => goTo(i === 0 ? Math.min(stage, 6) : Math.max(stage, 7))} style={{ padding: "7px 20px", borderRadius: 28, fontSize: 13, fontWeight: 700, cursor: "pointer", background: active ? `linear-gradient(135deg, ${c1}, ${c2})` : i === 0 ? "#e8e0f0" : "#f0e0e0", color: active ? "#fff" : i === 0 ? "#9a8cb8" : "#c0a0a0" }}>{text}</div>
          ))}
        </div>

        {!isPart2 ? <ProgressBar currentStep={stage} totalSteps={7} stepNames={P1} onStepClick={goTo} /> : <ProgressBar currentStep={stage - 7} totalSteps={4} stepNames={P2} onStepClick={i => goTo(i + 7)} />}

        {stages[stage]}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
